version: 2
tag: fishing_village
building:
  key: fishing_village
  mode: REPLACE
  source: pp_food_buildings.txt
  production_method_slots:
    - name: slot_0
      methods:
        - pp_fishing_village_maintenance
        - pp_arctic_fishing_village_maintenance
    - name: slot_1
      methods:
        - pp_fishing_village_strand_line
        - pp_fishing_village_clinker_craft
        - pp_fishing_village_deep_water
  possible_production_methods: []
  body: |2-
    	is_foreign = no
    	max_levels = fishing_village_max_level
    	pop_type = peasants
    	category = village_category
    	employment_size = 5
    	rural_settlement = yes
    	town = yes
    	city = yes
    	forbidden_for_estates = yes
    	ai_forbid_shutdown = no
    	location_potential = {
    		has_variable = pp_fishing_village_fixed_env_bonus
    		var:pp_fishing_village_fixed_env_bonus > 0
    	}
    	build_time = village_build_time
    	# Slot 0 — fishery ground / climate (temperate vs arctic)
    	unique_production_methods = {
    		pp_fishing_village_maintenance = {
    			produced = fish
    			output = 0.35
    			salt = 0.085
    			tools = 0.35
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    		pp_arctic_fishing_village_maintenance = {
    			produced = fish
    			output = 0.35
    			salt = 0.030
    			ivory = 0.075
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    	}
    	# Slot 1 — fishing method (handline / clinker boats / deep-water; latter unlocked by regional Distant-Water Fishing advances)
    	unique_production_methods = {
    		pp_fishing_village_strand_line = {
    			category = building_maintenance
    		}
    		pp_fishing_village_clinker_craft = {
    			lumber = 0.15
    			produced = fish
    			output = 0.10
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    		pp_fishing_village_deep_water = {
    			naval_supplies = 0.25
    			produced = fish
    			output = 0.25
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    	}
    	construction_demand = village_construction
    	modifier = {
    		local_monthly_food = 0.0
    		local_merchant_capacity = 0.10
    		local_peasants_estate_power = 0.25
    		local_maritime_presence = 0.01
    		harbor_suitability = 0.01
    		local_sailors = 0.001
    	}
