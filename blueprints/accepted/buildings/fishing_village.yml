    		pp_fishing_village_strand_line = {
    			category = building_maintenance
    		}
    		pp_fishing_village_clinker_craft = {
    			lumber = 0.15
    			produced = fish
    			output = 0.10
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    	}
    	# Slot 2 - freshwater and local-water works
    	unique_production_methods = {
    		pp_fishing_village_no_freshwater_works = {
    			category = building_maintenance
    		}
    		pp_fishing_village_wattle_weirs = {
    			lumber = 0.10
    			fiber_crops = 0.08
    			produced = fish
    			output = 0.15
    			debug_max_profit = 0
    			category = building_maintenance
    		}
    		pp_fishing_village_stew_ponds = {
    			clay = 0.12
