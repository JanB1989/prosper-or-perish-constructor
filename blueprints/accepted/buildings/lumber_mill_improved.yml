    lumber_mill_improved: Planned Saw Works
    lumber_mill_improved_desc: Planned saw works combine managed timber stands, forest ordinances, log landings, and improved saw frames. They move far more wood by employing larger crews and consuming more supplies, not by making lumber extraction inherently more profitable.
    lumber_mill_improved_slot_0: Managed Timber Stand
    lumber_mill_improved_slot_1: Saw Works
    pp_lumber_mill_improved_forest_ordinances: Forest Ordinances
    pp_lumber_mill_improved_managed_stands: Managed Timber Stands
    pp_lumber_mill_improved_no_primary: No Planned Saw Works
    pp_lumber_mill_improved_price: Planned Saw Works Price
icon:
