  entries:
    MODIFIER_TYPE_DESC_pp_ocean_fishery_price_cost_modifier: Affects the cost of building an [ShowBuildingTypeName('ocean_fishery')|e].
    MODIFIER_TYPE_NAME_pp_ocean_fishery_price_cost_modifier: Ocean Fishery Cost
    ocean_fishery_slot_0: Coastal Waters
    ocean_fishery_slot_1: Coastal Gear
    ocean_fishery_slot_2: Offshore Fleet
    ocean_fishery: Ocean Fishery
    ocean_fishery_desc: A coastal fishery where laborers work boats, nets, curing barrels, and distant-water fleets beyond the local strand. Small crews supply the shore trade, while herring busses, bank schooners, and steam trawlers turn fish into a larger but more demanding maritime industry.
    pp_ocean_fishery_base_catch: Coastal Waters
    pp_ocean_fishery_no_coastal_gear: No Coastal Gear
    pp_ocean_fishery_coastal_boats: Coastal Boats
    pp_ocean_fishery_no_offshore_fleet: No Offshore Fleet
    pp_ocean_fishery_herring_busses: Herring Busses
    pp_ocean_fishery_distant_water_schooners: Distant-Water Schooners
    pp_ocean_fishery_steam_trawlers: Steam Trawlers
    pp_ocean_fishery_price: Ocean Fishery Price
    pp_herring_buss_north_sea_desc: Develop broad-beamed herring busses, drift nets, barrels, and salt-curing routines for longer North Sea fishing voyages.
    pp_herring_buss_coastal_desc: Adopt herring busses and organized offshore curing fleets along the Atlantic coasts.
    pp_herring_buss_general_desc: Spread herring-buss fishing methods to wider maritime regions, using larger boats, nets, salt, and curing crews.
    pp_grand_banks_fishery_early_desc: Organize distant-water schooner fleets for the Grand Banks and other rich offshore grounds, supported by provisions, salt, and naval supplies.
    pp_grand_banks_fishery_maritime_desc: Expand maritime distant-water fisheries with provisioned schooners and salted catches.
    pp_grand_banks_fishery_general_desc: Adopt distant-water fishing fleets outside the early Atlantic powers.
    pp_steam_trawling_north_sea_desc: Use coal-fired steam trawlers and steel gear to work deeper North Sea grounds at much higher material cost.
    pp_steam_trawling_general_desc: Spread steam trawling to wider fishing fleets, replacing passive output gains with fuel- and steel-intensive production.
icon:
