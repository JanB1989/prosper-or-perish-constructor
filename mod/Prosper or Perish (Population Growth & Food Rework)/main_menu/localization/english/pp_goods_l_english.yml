l_english:
  pp_granary_maintenance: "Granaries"
  victuals: "Victuals"
  victuals_desc: "The lifeblood of any campaign or settlement. Crafted from basic food resources in the [ShowBuildingTypeName('cookery')|e], victuals encompass everything from fresh regional dishes to carefully preserved, travel-ready rations. They are essential for sustaining professional armies and navies on long voyages, and are actively traded and distributed to the populace through the [ShowBuildingTypeName('victuals_market')|e]."