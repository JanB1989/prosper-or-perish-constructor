l_english:
 pp_mod_welcome_situation: "Welcome to Prosper or Perish"
 pp_mod_welcome_situation_desc: "#T Game Start Settings#!\nHigher #high Player Building Maintenance#! in the game rules supports historical AI growth, but it makes the campaign harder. I recommend this if you are experienced and/or want to play larger nations.\n\nIf you want ahistorical AI growth and a harder challenge, you can use the P&P harder AI settings in the game rules.\n\nYou can also turn off [pp_variable_harvests|e] if you prefer.\n\n#T Compatibility#!\nWant to play an old savegame? Read [pp_faq|e] in [Link('encyclopedia', '', 'lateralview_encyclopedia_entry_name')] for how to install an older mod version.\n\nOtherwise, start a new game if you notice an update.\n\nIf you want to use other mods, use them at your own risk. I recommend loading P&P last ALWAYS and running your mod list in Observer mode for about half an hour to see if everything looks normal.\n\nP&P is compatible with Faster Universalis.\n\n#T Documentation#!\nI've documented Prosper or Perish extensively in [Link('encyclopedia', '', 'lateralview_encyclopedia_entry_name')]; the button to open it is in the top right of your screen.\n\n#T Changes 0.7.0 (23 March 2026)#!\nIn this patch I added more map modes; better and more cookery recipes; much finer bonuses to farmed goods from location RGO, vegetation, climate, topography, rivers, and lakes. And as usual, many more changes.\n\n#T Changes 0.7.1 (25 March 2026)#!\nThis update is savegame compatible; it could only lead to minor economic issues that should resolve quickly in a running game.\n\nSeveral bugs have been fixed. Capacity for labourer buildings has been increased. Employment size for Stud Farms, Lumber Mills, and Fiber Crops farms has been increased from 1k to 3k."
