[metadata]
version = 1
historical_population_policy = "saturation_anchors_only"
notes = "Historical population is used only where sustained dense agrarian settlement supports a near-potential or lower-bound anchor. These anchors calibrate scale and diagnostics; they are not universal labels."

[[anchors]]
id = "nile_lower_egypt"
label = "Nile delta and lower Egypt"
scope = "area"
key = "lower_egypt_area"
years = "1300-1500 CE"
population_or_density_estimate = "sustained high-density irrigated agrarian core; use as near-potential density signal, not exact population label"
confidence = "high"
use_role = "scale_anchor"
capacity_mean_floor = 80
capacity_median_floor = 90
evidence = "Long-run irrigated floodplain agriculture and dense settlement make this a strong pre-modern carrying-capacity anchor."
sources = [
    "https://models.pbl.nl/image/HYDE_database",
    "https://clio-infra.eu/Indicators/TotalPopulation.html",
]

